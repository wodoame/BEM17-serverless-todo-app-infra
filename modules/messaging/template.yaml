AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Messaging module - SNS topic for task notifications, and the decoupled,
  idempotent expiry-cancellation pipeline (DynamoDB Streams -> SQS FIFO ->
  Lambda) that cancels a task's scheduled expiry when it is Completed or
  Deleted before its deadline. Cancellation deletes an EventBridge
  Scheduler schedule named "task-{TaskId}" in the given schedule group;
  the events module (not yet built) must create schedules under that same
  name/group when a task is created.

Parameters:
  AppName:
    Type: String
  TasksTableStreamArn:
    Type: String
  ScheduleGroupName:
    Type: String

Resources:
  # Fan-out topic for user notifications; PostAuthenticationFunction subscribes
  # each user's email on first sign-in.
  NotificationsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${AppName}-notifications

  # Cognito PostAuthentication trigger - subscribes the signed-in user's email
  # to NotificationsTopic so future task notifications reach them.
  PostAuthenticationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AppName}-post-authentication
      CodeUri: src/post_authentication/
      Handler: app.handler
      Runtime: python3.12
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          TOPIC_ARN: !Ref NotificationsTopic
      Policies:
        - Statement:
            - Effect: Allow
              Action: sns:Subscribe
              Resource: !Ref NotificationsTopic

  # Catches CancellationQueue messages that fail delivery maxReceiveCount times
  # (e.g. a persistent Scheduler API error) so they're never silently dropped.
  CancellationDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AppName}-cancellation-dlq.fifo
      FifoQueue: true

  # FIFO so per-task cancellation messages (grouped by MessageGroupId=TaskId in
  # StreamProcessorFunction) are processed in order and never in parallel for the same task.
  CancellationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AppName}-cancellation.fifo
      FifoQueue: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt CancellationDeadLetterQueue.Arn
        maxReceiveCount: 5

  # Consumes the Tasks table's DynamoDB Stream and publishes a cancellation
  # message when a Pending task is Completed or Deleted before its deadline.
  # FilterCriteria drops INSERT records at the event-source level so task creation never invokes this function.
  StreamProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AppName}-stream-processor
      CodeUri: src/stream_processor/
      Handler: app.handler
      Runtime: python3.12
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          QUEUE_URL: !Ref CancellationQueue
      Policies:
        - Statement:
            - Effect: Allow
              Action: sqs:SendMessage
              Resource: !GetAtt CancellationQueue.Arn
      Events:
        TasksStream:
          Type: DynamoDB
          Properties:
            Stream: !Ref TasksTableStreamArn
            StartingPosition: LATEST
            BatchSize: 10
            MaximumRetryAttempts: 3
            FilterCriteria:
              Filters:
                - Pattern: '{"eventName": ["MODIFY", "REMOVE"]}'

  # Deletes the EventBridge Scheduler schedule ("task-{TaskId}") for a
  # cancelled task so its expiry handler never fires.
  CancellationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AppName}-cancel-expiry
      CodeUri: src/cancel_expiry/
      Handler: app.handler
      Runtime: python3.12
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          SCHEDULE_GROUP_NAME: !Ref ScheduleGroupName
      Policies:
        - Statement:
            - Effect: Allow
              Action: scheduler:DeleteSchedule
              Resource: !Sub arn:${AWS::Partition}:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/${ScheduleGroupName}/*
      Events:
        CancellationQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt CancellationQueue.Arn
            BatchSize: 1 # BatchSize=1 so one task's Scheduler failure doesn't affect other messages in the same poll;


Outputs:
  NotificationsTopicArn:
    Value: !Ref NotificationsTopic
  PostAuthenticationFunctionArn:
    Value: !GetAtt PostAuthenticationFunction.Arn
  CancellationQueueArn:
    Value: !GetAtt CancellationQueue.Arn
  CancellationQueueUrl:
    Value: !Ref CancellationQueue
